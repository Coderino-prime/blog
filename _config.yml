# Basics
title: The Coderino Crashpad

description: >- 
  A place for the most mundane of posts.

url: https://coderino-prime.github.io

baseurl: /blog

avatar: assets/img/ANewPepeChristmas.gif

timezone: America/New_York

lang: en

#tagline: testing


# Social stuff
social:
  name: Coder
  email: wouldntyou@liketoknow.com

github:
  username: Coderino-prime
  

# Build settings
theme: jekyll-theme-chirpy

plugins:
  - jekyll-paginate
  - jekyll-redirect-from

toc: true

paginate: 10
paginate_path: /page:num/

collections:
  tabs:
    output: true
    sort_by: order

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/



